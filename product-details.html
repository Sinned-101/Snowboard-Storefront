<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Black Diamond Gear</title>

    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header section -->
<header>
    <nav class="navbar">
        <!-- Website name/title -->
        <h1 class="site-title">Black Diamond Gear</h1>

        <!-- Main navigation links -->
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="messages.html">Expert Help</a></li>
            <li><a href="login.html">Login</a></li>

<!-- Main content -->
<main>

    <!-- Displays information about one selected item -->
    <section class="product-detail">
        <article class="detail-card">
            <h2>Summit All-Mountain 156</h2>

            <!-- Product image (placeholder until images are added to the database) -->
            <img src="images/summit-all-mountain-156.jpg"
                 alt="Summit All-Mountain 156 Snowboard"
                 class="product-image">

            <!-- Product information -->
             <p class="product-price">$449.99</p>
             <p><strong>Category:</strong> Snowboards</p>
             <p><strong>Description:</strong> Versatile all-mountain board, 156cm</p>
             <p><strong>Stock Quantity:</strong> 20</p>
            
            <!-- Product action links -->
            <p class="product-actions">
                <a href="cart.html" class="button">Add to Cart</a>
                <a href="messages.html" class="button secondary">Ask an Expert</a>
                <a href="products.html" class="button secondary">Back to Products</a>

</main>
