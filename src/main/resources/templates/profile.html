<!DOCTYPE html>
<!-- xmlns:th tells Thymeleaf to process th: attributes in this file -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Black Diamond Gear</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <nav class="navbar">
        <h1 class="site-title">Black Diamond Gear</h1>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/products}">Products</a></li>
            <li><a th:href="@{/logout}">Logout</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="page-heading">
        <h2>Edit Profile</h2>
        <p>Update your personal information below</p>
    </section>

    <section class="form-section">

        <!-- Form submits to POST /profile in ProfileController -->
        <form class="account-form-wide" th:action="@{/profile}" method="post">
            <h2>Your Profile</h2>

            <!-- th:value pre-fills each input with the current value from the database -->
            <p>
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" th:value="${profile.firstName}" required>
            </p>

            <p>
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" th:value="${profile.lastName}" required>
            </p>

            <p>
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" th:value="${profile.phone}">
            </p>

            <p>
                <label for="address_line">Street Address</label>
                <input type="text" id="address_line" name="address_line" th:value="${profile.addressLine}">
            </p>

            <p>
                <label for="city">City</label>
                <input type="text" id="city" name="city" th:value="${profile.city}">
            </p>

            <p>
                <label for="state">State</label>
                <input type="text" id="state" name="state" th:value="${profile.state}">
            </p>

            <p>
                <label for="postal_code">Postal Code</label>
                <input type="text" id="postal_code" name="postal_code" th:value="${profile.postalCode}">
            </p>

            <p>
                <label for="country">Country</label>
                <input type="text" id="country" name="country" th:value="${profile.country}">
            </p>

            <p>
                <label for="bio">Bio</label>
                <input type="text" id="bio" name="bio" th:value="${profile.bio}">
            </p>

            <p class="form-actions">
                <button type="submit" class="button">Save Changes</button>
                <!-- Change password is a separate page since it requires verifying the current password -->
                <a th:href="@{/change-password}" class="button">Change Password</a>
            </p>

        </form>

    </section>

</main>

<footer>
    <p>&copy; 2026 Black Diamond Gear. All rights reserved.</p>
</footer>

</body>
</html>
