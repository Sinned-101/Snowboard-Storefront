<!DOCTYPE html>
<!-- xmlns:th tells Thymeleaf to process th: attributes in this file -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Black Diamond Gear</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <nav class="navbar">
        <h1 class="site-title">Black Diamond Gear</h1>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/products}">Products</a></li>
            <li><a th:href="@{/logout}">Logout</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="page-heading">
        <h2>Change Password</h2>
        <p>Enter your current password to confirm your identity, then set a new one</p>
    </section>

    <section class="form-section">

        <!-- Form submits to POST /change-password in PasswordController -->
        <form class="account-form" th:action="@{/change-password}" method="post">
            <h2>Update Password</h2>

            <!-- Shows an error message if the current password is wrong or passwords do not match -->
            <p class="error-message" th:if="${passwordError}" th:text="${passwordError}"></p>

            <p>
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required>
            </p>

            <p>
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required>
            </p>

            <p>
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </p>

            <p class="form-actions">
                <button type="submit" class="button">Update Password</button>
                <!-- Cancel goes back to the profile page without making any changes -->
                <a th:href="@{/profile}" class="button">Cancel</a>
            </p>

        </form>

    </section>

</main>

<footer>
    <p>&copy; 2026 Black Diamond Gear. All rights reserved.</p>
</footer>

</body>
</html>
